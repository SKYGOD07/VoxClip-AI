# ==========================================
# VoxClip AI — Cloud Build Configuration
# ==========================================
# Builds Docker image and deploys to Cloud Run

steps:
  # Step 1: Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/voxclip-ai:$COMMIT_SHA"
      - "-t"
      - "gcr.io/$PROJECT_ID/voxclip-ai:latest"
      - "."

  # Step 2: Push the image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/voxclip-ai:$COMMIT_SHA"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/voxclip-ai:latest"

  # Step 3: Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "voxclip-ai"
      - "--image"
      - "gcr.io/$PROJECT_ID/voxclip-ai:$COMMIT_SHA"
      - "--region"
      - "us-central1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--port"
      - "5000"
      - "--memory"
      - "2Gi"
      - "--cpu"
      - "2"
      - "--timeout"
      - "300"
      - "--set-env-vars"
      - "NODE_ENV=production,PORT=5000"

# Store built images
images:
  - "gcr.io/$PROJECT_ID/voxclip-ai:$COMMIT_SHA"
  - "gcr.io/$PROJECT_ID/voxclip-ai:latest"

# Build configuration
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"

# Build timeout (10 minutes)
timeout: "600s"
